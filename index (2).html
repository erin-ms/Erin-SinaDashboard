<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Erin & Sina</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F0E8;--card:#FFFDF8;--text:#1C1917;--muted:#78716C;--border:#E5DDD0;--health:#4A7C59;--fun:#C2622D;--home:#5B6FA6;--work:#8B5E3C;--growth:#7C5C8A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}

/* PIN */
.pin-screen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;}
.pin-screen.hidden{display:none;}
.pin-logo{font-family:'Playfair Display',serif;font-size:32px;font-weight:400;margin-bottom:8px;text-align:center;}
.pin-sub{font-size:13px;color:var(--muted);margin-bottom:40px;text-align:center;}
.pin-dots{display:flex;gap:16px;margin-bottom:32px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:all 0.15s;}
.pin-dot.filled{background:var(--text);border-color:var(--text);}
.pin-dot.error{background:var(--fun);border-color:var(--fun);}
.pin-keypad{display:grid;grid-template-columns:repeat(3,72px);gap:12px;}
.pin-key{width:72px;height:72px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);font-family:'DM Sans',sans-serif;font-size:22px;font-weight:300;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.1s;-webkit-tap-highlight-color:transparent;}
.pin-key:active{background:var(--border);transform:scale(0.95);}
.pin-key.empty{border:none;background:none;cursor:default;}
.pin-key.delete{font-size:18px;}
.pin-error{margin-top:20px;font-size:12px;color:var(--fun);opacity:0;transition:opacity 0.2s;}
.pin-error.show{opacity:1;}

/* HEADER */
.header{padding:20px 20px 12px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.header h1{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;}
.date-str{font-size:11px;color:var(--muted);font-weight:300;}

/* NAV */
.nav{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;padding:0 20px;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:var(--muted);white-space:nowrap;transition:all 0.2s;letter-spacing:0.3px;}
.nav-btn.active{color:var(--text);border-bottom-color:var(--text);}

/* SCHEDULE */
.schedule-header{padding:20px 20px 12px;display:flex;justify-content:space-between;align-items:center;}
.schedule-header h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;}
.day-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.timeline{padding:0 20px;}
.time-block{display:flex;gap:14px;margin-bottom:2px;}
.time-col{width:52px;flex-shrink:0;padding-top:10px;font-size:11px;color:var(--muted);font-weight:300;text-align:right;}
.block-line{width:1px;background:var(--border);flex-shrink:0;position:relative;}
.block-dot{width:7px;height:7px;border-radius:50%;background:var(--border);position:absolute;left:-3px;top:13px;}
.block-dot.current{background:#C2622D;box-shadow:0 0 0 3px rgba(194,98,45,0.2);}
.block-content{flex:1;padding:8px 12px;border-radius:8px;margin:4px 0;transition:all 0.15s;}
.block-content:active{opacity:0.8;}
.block-content.work{background:rgba(139,94,60,0.1);border-left:3px solid var(--work);}
.block-content.break{background:rgba(120,113,108,0.08);border-left:3px solid var(--border);}
.block-content.personal{background:rgba(124,92,138,0.1);border-left:3px solid var(--growth);}
.block-content.health{background:rgba(74,124,89,0.1);border-left:3px solid var(--health);}
.block-content.social{background:rgba(91,111,166,0.1);border-left:3px solid var(--home);}
.block-content.mini{background:rgba(194,98,45,0.06);border-left:3px solid rgba(194,98,45,0.3);}
.block-label{font-size:13px;font-weight:500;color:var(--text);}
.block-sublabel{font-size:11px;color:var(--muted);margin-top:1px;}
.section-note{font-size:11px;color:var(--muted);padding:12px 20px 0;font-style:italic;}

/* LISTS */
.lists-container{padding:16px 20px;}
.list-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:8px;}
.list-card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;}
.list-card-title{font-size:13px;font-weight:500;}
.list-card-meta{display:flex;align-items:center;gap:8px;}
.item-count{font-size:11px;color:var(--muted);background:var(--bg);padding:2px 7px;border-radius:10px;}
.expand-btn{font-size:16px;color:var(--muted);background:none;border:none;cursor:pointer;line-height:1;padding:0 0 0 4px;}
.list-body{display:none;border-top:1px solid var(--border);}
.list-body.open{display:block;}
.list-items{padding:8px 0;}
.list-item{display:flex;align-items:center;padding:8px 14px;gap:10px;border-bottom:1px solid var(--border);}
.list-item:last-child{border-bottom:none;}
.item-check{width:18px;height:18px;border:1.5px solid var(--border);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.item-check.checked{background:var(--text);border-color:var(--text);color:white;font-size:10px;}
.item-text{flex:1;font-size:13px;font-weight:300;}
.item-text.done{text-decoration:line-through;color:var(--muted);}
.item-priority{font-size:10px;padding:2px 6px;border-radius:6px;font-weight:500;}
.priority-high{background:rgba(194,98,45,0.12);color:var(--fun);}
.priority-med{background:rgba(91,111,166,0.12);color:var(--home);}
.priority-low{background:rgba(120,113,108,0.1);color:var(--muted);}
.item-delete{font-size:14px;color:var(--border);background:none;border:none;cursor:pointer;padding:0;}
.item-delete:active{color:#C2622D;}
.add-form{display:flex;gap:8px;padding:10px 14px;background:var(--bg);border-top:1px solid var(--border);}
.add-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;}
.add-input:focus{border-color:var(--text);}
.priority-select{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--muted);outline:none;cursor:pointer;}
.add-btn{background:var(--text);color:white;border:none;border-radius:8px;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;}
.add-btn:active{opacity:0.8;}
.empty-state{padding:20px 14px;text-align:center;color:var(--muted);font-size:12px;font-style:italic;}

/* GROWTH */
.growth-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 20px;}
.growth-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 14px;text-align:center;cursor:pointer;transition:all 0.2s;}
.growth-card:active{transform:scale(0.97);}
.growth-icon{font-size:28px;margin-bottom:8px;}
.growth-label{font-size:13px;font-weight:500;}
.growth-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.growth-selected{border-color:var(--growth);background:rgba(124,92,138,0.06);}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:white;padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.3s;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.content{padding:0;}
.section{display:none;}
.section.active{display:block;}
</style>
</head>
<body>

<div class="pin-screen" id="pinScreen">
  <div class="pin-logo">Erin & Sina</div>
  <p class="pin-sub">Enter your PIN to continue</p>
  <div class="pin-dots">
    <div class="pin-dot" id="dot0"></div>
    <div class="pin-dot" id="dot1"></div>
    <div class="pin-dot" id="dot2"></div>
    <div class="pin-dot" id="dot3"></div>
  </div>
  <div class="pin-keypad">
    <button class="pin-key" onclick="pinPress('1')">1</button>
    <button class="pin-key" onclick="pinPress('2')">2</button>
    <button class="pin-key" onclick="pinPress('3')">3</button>
    <button class="pin-key" onclick="pinPress('4')">4</button>
    <button class="pin-key" onclick="pinPress('5')">5</button>
    <button class="pin-key" onclick="pinPress('6')">6</button>
    <button class="pin-key" onclick="pinPress('7')">7</button>
    <button class="pin-key" onclick="pinPress('8')">8</button>
    <button class="pin-key" onclick="pinPress('9')">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" onclick="pinPress('0')">0</button>
    <button class="pin-key delete" onclick="pinDelete()">⌫</button>
  </div>
  <div class="pin-error" id="pinError">Incorrect PIN — try again</div>
</div>

<div class="header">
  <div class="header-top">
    <h1>Erin & Sina</h1>
    <span class="date-str" id="dateStr"></span>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showSection('schedule')">Today</button>
  <button class="nav-btn" onclick="showSection('health')">Health & Food</button>
  <button class="nav-btn" onclick="showSection('fun')">Fun & Culture</button>
  <button class="nav-btn" onclick="showSection('home')">Home & Life</button>
  <button class="nav-btn" onclick="showSection('work')">Work</button>
  <button class="nav-btn" onclick="showSection('growth')">Growth</button>
</div>

<div class="content">
  <div class="section active" id="section-schedule">
    <div class="schedule-header">
      <h2>Daily Rhythm</h2>
      <span class="day-label" id="dayLabel"></span>
    </div>
    <p class="section-note">Tap a block to jump to its lists →</p>
    <div class="timeline" id="timeline"></div>
  </div>
  <div class="section" id="section-health"><div class="lists-container" id="lists-health"></div></div>
  <div class="section" id="section-fun"><div class="lists-container" id="lists-fun"></div></div>
  <div class="section" id="section-home"><div class="lists-container" id="lists-home"></div></div>
  <div class="section" id="section-work"><div class="lists-container" id="lists-work"></div></div>
  <div class="section" id="section-growth">
    <p class="section-note" style="padding-bottom:8px;">Tap what feels right today</p>
    <div class="growth-grid" id="growth-grid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// PIN
const CORRECT_PIN = '8890';
const PIN_KEY = 'es_pin_v1';
let pinEntry = '';

function checkPinSession() {
  const t = localStorage.getItem(PIN_KEY);
  if (t && (Date.now() - parseInt(t)) < 86400000) {
    document.getElementById('pinScreen').classList.add('hidden');
    return true;
  }
  return false;
}

function pinPress(d) {
  if (pinEntry.length >= 4) return;
  pinEntry += d;
  updateDots();
  if (pinEntry.length === 4) setTimeout(checkPin, 100);
}

function pinDelete() {
  pinEntry = pinEntry.slice(0,-1);
  updateDots();
}

function updateDots() {
  for (let i=0;i<4;i++) {
    const dot = document.getElementById('dot'+i);
    dot.classList.toggle('filled', i < pinEntry.length);
    dot.classList.remove('error');
  }
}

function checkPin() {
  if (pinEntry === CORRECT_PIN) {
    localStorage.setItem(PIN_KEY, Date.now().toString());
    document.getElementById('pinScreen').classList.add('hidden');
    initApp();
  } else {
    for (let i=0;i<4;i++) document.getElementById('dot'+i).classList.add('error');
    document.getElementById('pinError').classList.add('show');
    setTimeout(() => {
      pinEntry = '';
      updateDots();
      document.getElementById('pinError').classList.remove('show');
    }, 1000);
  }
}

// DATA
const STORE = 'es_data_v1';

function makeItem(text) {
  return {id: Date.now()+Math.floor(Math.random()*99999), text, priority:'', done:false};
}

const DEFAULTS = {
  groceries:    {name:'Groceries / Stuff to Buy',   section:'health', items:[]},
  recipes:      {name:'Recipes & Food Ideas',        section:'health', items:[makeItem('Add your favourite recipes here')]},
  restaurants:  {name:'Restaurants to Try',          section:'health', items:[makeItem('Add restaurants you want to visit')]},
  mentalHealth: {name:'Mental Health',               section:'health', items:[makeItem('Add resources or things that help')]},
  movies:       {name:'Movies',                      section:'fun',    items:[makeItem('Add movies you want to watch')]},
  shows:        {name:'Shows',                       section:'fun',    items:[makeItem('Add shows you want to watch')]},
  books:        {name:'Books',                       section:'fun',    items:[makeItem('Add books you want to read')]},
  hobbies:      {name:'Hobbies',                     section:'fun',    items:[makeItem('Add hobbies you want to explore')]},
  activities:   {name:'Activities & Experiences',    section:'fun',    items:[makeItem('Add things you want to do together')]},
  tasksErin:    {name:'Tasks — Erin',                section:'home',   items:[]},
  tasksSina:    {name:'Tasks — Sina',                section:'home',   items:[]},
  tasksShared:  {name:'Tasks — Shared',              section:'home',   items:[]},
  discuss:      {name:'Things to Discuss',           section:'home',   items:[makeItem('Add topics to talk about')]},
  workErin:     {name:'Work — Erin',                 section:'work',   items:[]},
  workSina:     {name:'Work — Sina',                 section:'work',   items:[]},
  workShared:   {name:'Work — Shared',               section:'work',   items:[]},
};

let appData;

function loadData() {
  try {
    const raw = localStorage.getItem(STORE);
    if (raw) {
      const d = JSON.parse(raw);
      // Add any missing lists
      Object.keys(DEFAULTS).forEach(k => {
        if (!d.lists[k]) d.lists[k] = JSON.parse(JSON.stringify(DEFAULTS[k]));
      });
      return d;
    }
  } catch(e){}
  return {lists: JSON.parse(JSON.stringify(DEFAULTS))};
}

function save() {
  localStorage.setItem(STORE, JSON.stringify(appData));
}

// SCHEDULE
const schedule = [
  {time:'5:45', label:'Wake up', type:'personal'},
  {time:'6:00', label:'Gym', type:'health', sub:'2 hours'},
  {time:'8:00', label:'Breakfast + Shower + Food tracking', type:'health'},
  {time:'9:00', label:'Work Block 1', type:'work', link:'work'},
  {time:'9:50', label:'Break', type:'break'},
  {time:'10:00', label:'Work Block 2', type:'work', link:'work'},
  {time:'10:50', label:'Break 2', type:'break'},
  {time:'11:00', label:'Work Block 3', type:'work', link:'work'},
  {time:'12:00', label:'Mini Work Block', type:'mini', link:'work'},
  {time:'12:30', label:'Walk + Strength Training + Lunch', type:'health'},
  {time:'1:30', label:'Mini Block 2', type:'mini', sub:'PG calls etc', link:'work'},
  {time:'2:00', label:'Work Block 4', type:'work', link:'work'},
  {time:'2:50', label:'Mini Break', type:'break'},
  {time:'3:00', label:'Work Block 5', type:'work', link:'work'},
  {time:'3:50', label:'Break', type:'break'},
  {time:'4:00', label:'Work Block 6', type:'work', link:'work'},
  {time:'4:50', label:'Mini Block', type:'mini', link:'work'},
  {time:'5:30', label:'Personal Time', type:'personal', sub:'Meditation, stretching', link:'growth'},
  {time:'6:00', label:'Dinner + Relationship Time', type:'social'},
  {time:'7:00', label:'Work Block 7', type:'work', sub:'Growth / personal', link:'work'},
  {time:'8:30', label:'Bed Time Routine', type:'personal'},
  {time:'9:00', label:'TV', type:'personal', sub:'Wind down', link:'fun'},
  {time:'10:00', label:'Sleep', type:'break'},
];

const eveningThemes = {0:'Work/Relationship',1:'Work',2:'Personal',3:'Work',4:'Personal',5:'Relationship',6:'Family/Adventure'};

function parseTime(s) {const [h,m]=s.split(':').map(Number);return h*60+(m||0);}

function renderSchedule() {
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('dayLabel').textContent = days[now.getDay()];
  document.getElementById('dateStr').textContent = now.toLocaleDateString('en-CA',{month:'short',day:'numeric'});
  const cur = now.getHours()*60+now.getMinutes();
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';
  schedule.forEach((b,i) => {
    const bm = parseTime(b.time);
    const nm = i<schedule.length-1?parseTime(schedule[i+1].time):bm+60;
    const isCur = cur>=bm&&cur<nm;
    const row = document.createElement('div');
    row.className = 'time-block';
    const tc = document.createElement('div');
    tc.className = 'time-col';
    tc.textContent = b.time;
    const line = document.createElement('div');
    line.className = 'block-line';
    const dot = document.createElement('div');
    dot.className = 'block-dot'+(isCur?' current':'');
    line.appendChild(dot);
    const c = document.createElement('div');
    c.className = 'block-content '+b.type;
    if(isCur) c.style.outline='2px solid rgba(194,98,45,0.4)';
    const lbl = document.createElement('div');
    lbl.className = 'block-label';
    lbl.textContent = b.label+(b.link?' →':'');
    c.appendChild(lbl);
    if(b.sub){const s=document.createElement('div');s.className='block-sublabel';s.textContent=b.sub;c.appendChild(s);}
    if(b.link){c.style.cursor='pointer';c.onclick=()=>showSection(b.link);}
    row.appendChild(tc);row.appendChild(line);row.appendChild(c);
    tl.appendChild(row);
  });
  const note = document.createElement('div');
  note.style.cssText='padding:12px 20px 20px;font-size:12px;color:var(--muted);font-style:italic;';
  note.textContent='Tonight: '+eveningThemes[now.getDay()];
  tl.appendChild(note);
}

// LISTS
const sectionOrder = {
  health:['groceries','recipes','restaurants','mentalHealth'],
  fun:['movies','shows','books','hobbies','activities'],
  home:['tasksErin','tasksSina','tasksShared','discuss'],
  work:['workErin','workSina','workShared'],
};

function renderLists(sid) {
  const container = document.getElementById('lists-'+sid);
  container.innerHTML='';
  sectionOrder[sid].forEach(key => {
    const list = appData.lists[key];
    const activeCount = list.items.filter(i=>!i.done).length;
    const card = document.createElement('div');
    card.className='list-card';
    const hdr = document.createElement('div');
    hdr.className='list-card-header';
    hdr.innerHTML=`<span class="list-card-title">${list.name}</span><div class="list-card-meta"><span class="item-count" id="count-${key}">${activeCount}</span><button class="expand-btn" id="chev-${key}">+</button></div>`;
    hdr.onclick=()=>toggleList(key);
    const body = document.createElement('div');
    body.className='list-body';
    body.id='body-'+key;
    const itemsDiv = document.createElement('div');
    itemsDiv.className='list-items';
    itemsDiv.id='items-'+key;
    renderItems(key,itemsDiv);
    const form = document.createElement('div');
    form.className='add-form';
    form.innerHTML=`<input class="add-input" id="input-${key}" placeholder="Add item…" onkeydown="if(event.key==='Enter')addItem('${key}')"><select class="priority-select" id="pri-${key}"><option value="">—</option><option value="high">High</option><option value="med">Med</option><option value="low">Low</option></select><button class="add-btn" onclick="addItem('${key}')">Add</button>`;
    body.appendChild(itemsDiv);body.appendChild(form);
    card.appendChild(hdr);card.appendChild(body);
    container.appendChild(card);
  });
}

function renderItems(key,container) {
  const items = appData.lists[key].items;
  container.innerHTML='';
  if(items.length===0){container.innerHTML='<div class="empty-state">Nothing here yet</div>';return;}
  const sorted=[...items.filter(i=>!i.done).sort((a,b)=>{const o={high:0,med:1,low:2,'':3};return(o[a.priority]||3)-(o[b.priority]||3);}), ...items.filter(i=>i.done)];
  sorted.forEach(item=>{
    const row=document.createElement('div');row.className='list-item';
    const chk=document.createElement('div');chk.className='item-check'+(item.done?' checked':'');chk.innerHTML=item.done?'✓':'';chk.onclick=()=>toggleDone(key,item.id);
    const txt=document.createElement('span');txt.className='item-text'+(item.done?' done':'');txt.textContent=item.text;
    const del=document.createElement('button');del.className='item-delete';del.textContent='×';del.onclick=()=>deleteItem(key,item.id);
    row.appendChild(chk);row.appendChild(txt);
    if(item.priority){const p=document.createElement('span');p.className='item-priority priority-'+item.priority;p.textContent=item.priority;row.appendChild(p);}
    row.appendChild(del);container.appendChild(row);
  });
}

function toggleList(key) {
  const body=document.getElementById('body-'+key);
  const chev=document.getElementById('chev-'+key);
  const open=body.classList.contains('open');
  body.classList.toggle('open',!open);
  chev.textContent=open?'+':'−';
  if(!open) setTimeout(()=>document.getElementById('input-'+key)?.focus(),100);
}

function updateCount(key) {
  const el=document.getElementById('count-'+key);
  if(el) el.textContent=appData.lists[key].items.filter(i=>!i.done).length;
}

function addItem(key) {
  const input=document.getElementById('input-'+key);
  const pri=document.getElementById('pri-'+key);
  const text=input.value.trim();
  if(!text) return;
  const newItem = {id:Date.now(),text,priority:pri.value,done:false};
  appData.lists[key].items.push(newItem);
  save();
  pushItem(key, newItem);
  input.value='';pri.value='';
  renderItems(key,document.getElementById('items-'+key));
  updateCount(key);
  showToast('Added ✓');
}

function toggleDone(key,id) {
  const item=appData.lists[key].items.find(i=>i.id===id);
  if(item){item.done=!item.done;save();pushItem(key,item);}
  renderItems(key,document.getElementById('items-'+key));
  updateCount(key);
}

function deleteItem(key,id) {
  appData.lists[key].items=appData.lists[key].items.filter(i=>i.id!==id);
  save();
  removeFromSheet(key,id);
  renderItems(key,document.getElementById('items-'+key));
  updateCount(key);
}


// SYNC
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzRaAl6hIu_--cQnwFj30ttonyywBKRSJVPm__90Eb9dED7pKjzWs4eoNm6RL_KsMM5ww/exec';

async function pushAllToSheet() {
  // Push every local item up to the sheet first
  const pushPromises = [];
  Object.keys(appData.lists).forEach(listKey => {
    appData.lists[listKey].items.forEach(item => {
      const url = SCRIPT_URL+'?action=upsert&listKey='+encodeURIComponent(listKey)+'&itemId='+encodeURIComponent(item.id)+'&itemData='+encodeURIComponent(JSON.stringify(item));
      pushPromises.push(fetch(url,{mode:'cors'}).catch(()=>{}));
    });
  });
  await Promise.all(pushPromises);
}

async function pushItem(listKey, item) {
  try {
    const url = SCRIPT_URL+'?action=upsert&listKey='+encodeURIComponent(listKey)+'&itemId='+encodeURIComponent(item.id)+'&itemData='+encodeURIComponent(JSON.stringify(item));
    await fetch(url,{mode:'cors'});
  } catch(e){}
}

async function removeFromSheet(listKey, itemId) {
  try {
    const url = SCRIPT_URL+'?action=delete&listKey='+encodeURIComponent(listKey)+'&itemId='+encodeURIComponent(itemId);
    await fetch(url,{mode:'cors'});
  } catch(e){}
}

async function syncFromSheet() {
  try {
    const res = await fetch(SCRIPT_URL+'?action=getAll',{mode:'cors'});
    const remote = await res.json();
    if(remote.error) return;
    // Only merge — never overwrite local items with empty
    Object.keys(remote).forEach(listKey => {
      if(!appData.lists[listKey]) return;
      const remoteItems = remote[listKey];
      if(!remoteItems || remoteItems.length === 0) return; // skip empty remote lists
      const localMap = {};
      appData.lists[listKey].items.forEach(i => localMap[i.id] = i);
      remoteItems.forEach(item => {
        localMap[item.id] = item; // remote wins for existing, adds new
      });
      appData.lists[listKey].items = Object.values(localMap);
    });
    save();
    // Re-render active section
    const active = document.querySelector('.section.active');
    if(active) {
      const id = active.id.replace('section-','');
      if(['health','fun','home','work'].includes(id)) renderLists(id);
    }
  } catch(e){}
}

async function startSync() {
  // Push local data up first, then start pulling
  await pushAllToSheet();
  await syncFromSheet();
  setInterval(syncFromSheet, 30000);
}

// GROWTH
const growthOptions=[
  {icon:'🧘',label:'Meditation',sub:'10–20 min'},
  {icon:'🤸',label:'Stretching',sub:'15 min'},
  {icon:'🚶',label:'Walk',sub:'Fresh air'},
  {icon:'🧘‍♀️',label:'Yoga',sub:'20–30 min'},
  {icon:'📓',label:'Journaling',sub:'Write it out'},
  {icon:'📖',label:'Read',sub:'From your list',link:'fun'},
];

function renderGrowth() {
  const grid=document.getElementById('growth-grid');
  grid.innerHTML='';
  growthOptions.forEach(opt=>{
    const card=document.createElement('div');card.className='growth-card';
    card.innerHTML=`<div class="growth-icon">${opt.icon}</div><div class="growth-label">${opt.label}</div><div class="growth-sub">${opt.sub}</div>`;
    card.onclick=()=>{
      document.querySelectorAll('.growth-card').forEach(c=>c.classList.remove('growth-selected'));
      card.classList.add('growth-selected');
      if(opt.link) setTimeout(()=>showSection(opt.link),300);
      else showToast(opt.label+' — enjoy 🌿');
    };
    grid.appendChild(card);
  });
}

// NAV
const navMap={schedule:0,health:1,fun:2,home:3,work:4,growth:5};
function showSection(id) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('section-'+id)?.classList.add('active');
  const btns=document.querySelectorAll('.nav-btn');
  if(navMap[id]!==undefined) btns[navMap[id]]?.classList.add('active');
  if(['health','fun','home','work'].includes(id)) renderLists(id);
}

// TOAST
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

// INIT
function initApp() {
  appData = loadData();
  renderSchedule();
  renderGrowth();
  renderLists('health');
  renderLists('fun');
  renderLists('home');
  renderLists('work');
  startSync();
}

// Start
if(checkPinSession()) {
  initApp();
}

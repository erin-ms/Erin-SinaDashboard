<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Erin & Sina</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#F5F0E8;--card:#FFFDF8;--text:#1C1917;--muted:#78716C;--border:#E5DDD0;--health:#4A7C59;--fun:#C2622D;--home:#5B6FA6;--work:#8B5E3C;--growth:#7C5C8A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}

/* PIN */
.pin-screen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;}
.pin-screen.hidden{display:none;}
.pin-logo{font-family:'Playfair Display',serif;font-size:32px;font-weight:400;margin-bottom:8px;text-align:center;}
.pin-sub{font-size:13px;color:var(--muted);margin-bottom:40px;text-align:center;}
.pin-dots{display:flex;gap:16px;margin-bottom:32px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:all 0.15s;}
.pin-dot.filled{background:var(--text);border-color:var(--text);}
.pin-dot.error{background:var(--fun);border-color:var(--fun);}
.pin-keypad{display:grid;grid-template-columns:repeat(3,72px);gap:12px;}
.pin-key{width:72px;height:72px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);font-family:'DM Sans',sans-serif;font-size:22px;font-weight:300;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.1s;-webkit-tap-highlight-color:transparent;}
.pin-key:active{background:var(--border);transform:scale(0.95);}
.pin-key.empty{border:none;background:none;cursor:default;}
.pin-key.delete{font-size:18px;}
.pin-error{margin-top:20px;font-size:12px;color:var(--fun);opacity:0;transition:opacity 0.2s;}
.pin-error.show{opacity:1;}

/* HEADER */
.header{padding:16px 20px 10px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.header-top{display:flex;justify-content:space-between;align-items:center;}
.header h1{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;}
.header-right{display:flex;align-items:center;gap:8px;}
.date-str{font-size:11px;color:var(--muted);font-weight:300;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--border);display:inline-block;transition:background 0.3s;}
.sync-dot.live{background:#4A7C59;}
.sync-dot.syncing{background:#C2622D;}

/* NAV */
.nav{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;padding:0 20px;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:var(--muted);white-space:nowrap;transition:all 0.2s;letter-spacing:0.3px;}
.nav-btn.active{color:var(--text);border-bottom-color:var(--text);}

/* CALENDAR TAB */
.cal-person-bar{display:flex;align-items:center;padding:0 20px;background:var(--bg);border-bottom:1px solid var(--border);}
.cal-person-btn{padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:var(--muted);transition:all 0.2s;}
.cal-person-btn.active{color:var(--text);border-bottom-color:var(--text);}

/* WEEK NAV */
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;}
.week-nav-label{font-family:'Playfair Display',serif;font-size:16px;font-weight:400;}
.week-nav-controls{display:flex;align-items:center;gap:4px;}
.week-btn{background:none;border:1px solid var(--border);border-radius:6px;width:30px;height:30px;font-size:14px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.week-btn:active{background:var(--border);}
.today-btn{font-size:11px;font-weight:500;padding:0 10px;width:auto;color:var(--text);}

/* WEEK VIEW */
.week-view{padding:0 16px 20px;}
.day-section{margin-bottom:10px;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.day-section.today{border-color:var(--fun);border-width:1.5px;}
.day-header{display:flex;align-items:baseline;gap:8px;padding:10px 14px;background:var(--card);}
.day-header.today{background:rgba(194,98,45,0.06);}
.day-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);}
.day-name.today{color:var(--fun);}
.day-date{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;line-height:1;}
.day-date.today{color:var(--fun);}
.day-events{background:var(--card);border-top:1px solid var(--border);}
.day-event-row{display:flex;align-items:flex-start;gap:12px;padding:9px 14px;border-bottom:1px solid var(--border);}
.day-event-row:last-child{border-bottom:none;}
.day-event-time{font-size:11px;color:var(--muted);min-width:68px;flex-shrink:0;padding-top:1px;line-height:1.5;}
.day-event-title{font-size:13px;flex:1;line-height:1.4;}
.day-event-badge{font-size:9px;font-weight:700;color:white;padding:1px 5px;border-radius:3px;margin-left:6px;flex-shrink:0;align-self:flex-start;margin-top:2px;letter-spacing:0.4px;}
.day-free{padding:9px 14px;font-size:12px;color:var(--border);font-style:italic;}
.cal-loading{padding:30px 20px;text-align:center;color:var(--muted);font-size:12px;}
.cal-refresh-row{display:flex;justify-content:flex-end;padding:0 20px 6px;}
.cal-refresh-btn{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 0;}

/* LISTS */
.lists-container{padding:16px 20px;}
.list-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:8px;}
.list-card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;}
.list-card-title{font-size:13px;font-weight:500;}
.list-card-meta{display:flex;align-items:center;gap:8px;}
.item-count{font-size:11px;color:var(--muted);background:var(--bg);padding:2px 7px;border-radius:10px;}
.expand-btn{font-size:16px;color:var(--muted);background:none;border:none;cursor:pointer;line-height:1;padding:0 0 0 4px;}
.list-body{display:none;border-top:1px solid var(--border);}
.list-body.open{display:block;}
.list-items{padding:8px 0;}
.list-item{display:flex;align-items:center;padding:8px 14px;gap:10px;border-bottom:1px solid var(--border);}
.list-item:last-child{border-bottom:none;}
.item-check{width:18px;height:18px;border:1.5px solid var(--border);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.item-check.checked{background:var(--text);border-color:var(--text);color:white;font-size:10px;}
.item-text{flex:1;font-size:13px;font-weight:300;}
.item-text.done{text-decoration:line-through;color:var(--muted);}
.item-priority{font-size:10px;padding:2px 6px;border-radius:6px;font-weight:500;}
.priority-high{background:rgba(194,98,45,0.12);color:var(--fun);}
.priority-med{background:rgba(91,111,166,0.12);color:var(--home);}
.priority-low{background:rgba(120,113,108,0.1);color:var(--muted);}
.item-delete{font-size:14px;color:var(--border);background:none;border:none;cursor:pointer;padding:0;}
.item-delete:active{color:#C2622D;}
.add-form{display:flex;gap:8px;padding:10px 14px;background:var(--bg);border-top:1px solid var(--border);}
.add-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;}
.add-input:focus{border-color:var(--text);}
.priority-select{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--muted);outline:none;cursor:pointer;}
.add-btn{background:var(--text);color:white;border:none;border-radius:8px;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;}
.add-btn:active{opacity:0.8;}
.empty-state{padding:20px 14px;text-align:center;color:var(--muted);font-size:12px;font-style:italic;}

/* GROWTH */
.growth-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 20px;}
.growth-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 14px;text-align:center;cursor:pointer;transition:all 0.2s;}
.growth-card:active{transform:scale(0.97);}
.growth-icon{font-size:28px;margin-bottom:8px;}
.growth-label{font-size:13px;font-weight:500;}
.growth-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.growth-selected{border-color:var(--growth);background:rgba(124,92,138,0.06);}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:white;padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.3s;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.content{padding:0;}
.section{display:none;}
.section.active{display:block;}
</style>
</head>
<body>

<div class="pin-screen" id="pinScreen">
  <div class="pin-logo">Erin & Sina</div>
  <p class="pin-sub">Enter your PIN to continue</p>
  <div class="pin-dots">
    <div class="pin-dot" id="dot0"></div>
    <div class="pin-dot" id="dot1"></div>
    <div class="pin-dot" id="dot2"></div>
    <div class="pin-dot" id="dot3"></div>
  </div>
  <div class="pin-keypad">
    <button class="pin-key" onclick="pinPress('1')">1</button>
    <button class="pin-key" onclick="pinPress('2')">2</button>
    <button class="pin-key" onclick="pinPress('3')">3</button>
    <button class="pin-key" onclick="pinPress('4')">4</button>
    <button class="pin-key" onclick="pinPress('5')">5</button>
    <button class="pin-key" onclick="pinPress('6')">6</button>
    <button class="pin-key" onclick="pinPress('7')">7</button>
    <button class="pin-key" onclick="pinPress('8')">8</button>
    <button class="pin-key" onclick="pinPress('9')">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" onclick="pinPress('0')">0</button>
    <button class="pin-key delete" onclick="pinDelete()">⌫</button>
  </div>
  <div class="pin-error" id="pinError">Incorrect PIN — try again</div>
</div>

<div class="header">
  <div class="header-top">
    <h1>Erin & Sina</h1>
    <div class="header-right">
      <span class="date-str" id="dateStr"></span>
      <span class="sync-dot" id="syncDot"></span>
    </div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showSection('today')">Today</button>
  <button class="nav-btn" onclick="showSection('health')">Health & Food</button>
  <button class="nav-btn" onclick="showSection('fun')">Fun & Culture</button>
  <button class="nav-btn" onclick="showSection('home')">Home & Life</button>
  <button class="nav-btn" onclick="showSection('work')">Work</button>
  <button class="nav-btn" onclick="showSection('growth')">Growth</button>
</div>

<div class="content">

  <!-- CALENDAR / TODAY -->
  <div class="section active" id="section-today">
    <div class="cal-person-bar">
      <button class="cal-person-btn active" id="calBtn-erin" onclick="switchCal('erin')">Erin</button>
      <!-- Sina: <button class="cal-person-btn" id="calBtn-sina" onclick="switchCal('sina')">Sina</button> -->
    </div>
    <div class="week-nav">
      <span class="week-nav-label" id="weekLabel"></span>
      <div class="week-nav-controls">
        <button class="week-btn today-btn" onclick="goToday()">Today</button>
        <button class="week-btn" onclick="shiftWeek(-1)">‹</button>
        <button class="week-btn" onclick="shiftWeek(1)">›</button>
      </div>
    </div>
    <div class="cal-refresh-row">
      <button class="cal-refresh-btn" onclick="refreshCal()">↻ Refresh</button>
    </div>
    <div class="week-view" id="week-view">
      <div class="cal-loading">Loading calendar…</div>
    </div>
  </div>

  <div class="section" id="section-health"><div class="lists-container" id="lists-health"></div></div>
  <div class="section" id="section-fun"><div class="lists-container" id="lists-fun"></div></div>
  <div class="section" id="section-home"><div class="lists-container" id="lists-home"></div></div>
  <div class="section" id="section-work"><div class="lists-container" id="lists-work"></div></div>
  <div class="section" id="section-growth">
    <p style="font-size:11px;color:var(--muted);padding:12px 20px 8px;font-style:italic;">Tap what feels right today</p>
    <div class="growth-grid" id="growth-grid"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ─── PIN ───────────────────────────────────────────────────────────────────
const CORRECT_PIN = '8890';
const PIN_KEY = 'es_pin_v1';
let pinEntry = '';

function checkPinSession() {
  const t = localStorage.getItem(PIN_KEY);
  if (t && Date.now() - parseInt(t) < 86400000) { document.getElementById('pinScreen').classList.add('hidden'); return true; }
  return false;
}
function pinPress(d) { if (pinEntry.length>=4) return; pinEntry+=d; updateDots(); if(pinEntry.length===4) setTimeout(checkPin,100); }
function pinDelete() { pinEntry=pinEntry.slice(0,-1); updateDots(); }
function updateDots() { for(let i=0;i<4;i++){const dot=document.getElementById('dot'+i);dot.classList.toggle('filled',i<pinEntry.length);dot.classList.remove('error');} }
function checkPin() {
  if (pinEntry===CORRECT_PIN) {
    localStorage.setItem(PIN_KEY,Date.now().toString());
    document.getElementById('pinScreen').classList.add('hidden');
    initApp();
  } else {
    for(let i=0;i<4;i++) document.getElementById('dot'+i).classList.add('error');
    document.getElementById('pinError').classList.add('show');
    setTimeout(()=>{pinEntry='';updateDots();document.getElementById('pinError').classList.remove('show');},1000);
  }
}

// ─── DATA ──────────────────────────────────────────────────────────────────
const STORE = 'es_data_v2';
function makeItem(t){return{id:Date.now()+Math.floor(Math.random()*99999),text:t,priority:'',done:false};}
const DEFAULTS={
  groceries:{name:'Groceries / Stuff to Buy',section:'health',items:[]},
  recipes:{name:'Recipes & Food Ideas',section:'health',items:[makeItem('Add your favourite recipes here')]},
  restaurants:{name:'Restaurants to Try',section:'health',items:[makeItem('Add restaurants you want to visit')]},
  mentalHealth:{name:'Mental Health',section:'health',items:[makeItem('Add resources or things that help')]},
  movies:{name:'Movies',section:'fun',items:[makeItem('Add movies you want to watch')]},
  shows:{name:'Shows',section:'fun',items:[makeItem('Add shows you want to watch')]},
  books:{name:'Books',section:'fun',items:[makeItem('Add books you want to read')]},
  hobbies:{name:'Hobbies',section:'fun',items:[makeItem('Add hobbies you want to explore')]},
  activities:{name:'Activities & Experiences',section:'fun',items:[makeItem('Add things you want to do together')]},
  tasksErin:{name:'Tasks — Erin',section:'home',items:[]},
  tasksSina:{name:'Tasks — Sina',section:'home',items:[]},
  tasksShared:{name:'Tasks — Shared',section:'home',items:[]},
  discuss:{name:'Things to Discuss',section:'home',items:[makeItem('Add topics to talk about')]},
  workErin:{name:'Work — Erin',section:'work',items:[]},
  workSina:{name:'Work — Sina',section:'work',items:[]},
  workShared:{name:'Work — Shared',section:'work',items:[]},
};
let appData;
function loadData(){
  try{
    const raw=localStorage.getItem(STORE);
    if(raw){const d=JSON.parse(raw);Object.keys(DEFAULTS).forEach(k=>{if(!d.lists[k])d.lists[k]=JSON.parse(JSON.stringify(DEFAULTS[k]));});return d;}
    const old=localStorage.getItem('es_data_v1');
    if(old){const d=JSON.parse(old);Object.keys(DEFAULTS).forEach(k=>{if(!d.lists[k])d.lists[k]=JSON.parse(JSON.stringify(DEFAULTS[k]));});return d;}
  }catch(e){}
  return{lists:JSON.parse(JSON.stringify(DEFAULTS))};
}
function save(){localStorage.setItem(STORE,JSON.stringify(appData));}

// ─── CALENDAR ──────────────────────────────────────────────────────────────
const CALENDARS = {
  erin: [
    { url:'https://calendar.google.com/calendar/ical/erin%40erinshellington.com/public/basic.ics', label:'E', color:'#4A7C59' },
    { url:'https://calendar.google.com/calendar/ical/erin.shellington%40track3.org/private-083d425f8943a11f618bbcb20031a0ea/basic.ics', label:'W', color:'#8B5E3C' },
  ],
  // sina: [{ url:'SINA_ICS_URL', label:'S', color:'#5B6FA6' }],
};

const CORS_PROXY = 'https://corsproxy.io/?';
const DAY_NAMES  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON_NAMES  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let activeCal   = 'erin';
let weekOffset  = 0;
let cachedEvents = null; // { who, events[] }

function switchCal(who) {
  activeCal = who;
  document.querySelectorAll('.cal-person-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('calBtn-'+who)?.classList.add('active');
  cachedEvents = null;
  loadAndRenderWeek();
}

function shiftWeek(dir) { weekOffset += dir; renderWeek(); }
function goToday()      { weekOffset = 0;    renderWeek(); }

function getWeekDays() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const dow = today.getDay(); // 0=Sun
  const start = new Date(today);
  start.setDate(today.getDate() - dow + weekOffset * 7);
  return Array.from({length:7}, (_,i) => { const d=new Date(start); d.setDate(start.getDate()+i); return d; });
}

function sameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

function fmtTime(dt) {
  return dt.toLocaleTimeString('en-CA',{hour:'numeric',minute:'2-digit',hour12:true}).toLowerCase().replace(' ','');
}

// ICS parsing
function unfoldICS(text){ return text.replace(/\r\n[ \t]/g,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n'); }

function parseDT(fullKey, val) {
  const v = val.trim();
  const isAllDay = fullKey.includes('VALUE=DATE') || /^\d{8}$/.test(v);
  if (isAllDay) return { date:new Date(+v.slice(0,4), +v.slice(4,6)-1, +v.slice(6,8)), allDay:true };
  const isUTC = v.endsWith('Z');
  const yr=+v.slice(0,4),mo=+v.slice(4,6)-1,dy=+v.slice(6,8),hr=+v.slice(9,11)||0,mn=+v.slice(11,13)||0,sc=+v.slice(13,15)||0;
  return { date: isUTC ? new Date(Date.UTC(yr,mo,dy,hr,mn,sc)) : new Date(yr,mo,dy,hr,mn,sc), allDay:false };
}

function parseICS(text, calConfig) {
  const lines = unfoldICS(text).split('\n');
  const events = [];
  let inEvent=false, cur={};
  for (const rawLine of lines) {
    const line = rawLine.trimEnd();
    if (line==='BEGIN:VEVENT'){inEvent=true;cur={};continue;}
    if (line==='END:VEVENT'){
      inEvent=false;
      if(cur.summary&&cur.dtstart&&cur.status!=='CANCELLED') events.push({...cur,cal:calConfig});
      continue;
    }
    if(!inEvent) continue;
    const ci=line.indexOf(':'); if(ci===-1) continue;
    const fullKey=line.slice(0,ci).toUpperCase();
    const baseKey=fullKey.split(';')[0];
    const val=line.slice(ci+1);
    if(baseKey==='SUMMARY')     cur.summary=val.replace(/\\,/g,',').replace(/\\n/g,' ').replace(/\\/g,'').trim();
    else if(baseKey==='DTSTART'){try{cur.dtstart=parseDT(fullKey,val);}catch(e){}}
    else if(baseKey==='DTEND')  {try{cur.dtend=parseDT(fullKey,val);}catch(e){}}
    else if(baseKey==='RRULE')  cur.rrule=val;
    else if(baseKey==='EXDATE'){if(!cur.exdates)cur.exdates=[];cur.exdates.push(val);}
    else if(baseKey==='STATUS') cur.status=val.trim();
  }
  return events;
}

function occursOnDate(event, date) {
  if (!event.dtstart) return false;
  const dayStart = new Date(date.getFullYear(),date.getMonth(),date.getDate());
  const dayEnd   = new Date(date.getFullYear(),date.getMonth(),date.getDate()+1);
  const start    = event.dtstart.date;
  const startDay = new Date(start.getFullYear(),start.getMonth(),start.getDate());

  if (event.exdates) {
    for (const ex of event.exdates) {
      try {
        const exd = parseDT('EXDATE',ex).date;
        if (new Date(exd.getFullYear(),exd.getMonth(),exd.getDate()).getTime()===dayStart.getTime()) return false;
      } catch(e){}
    }
  }

  if (!event.rrule) {
    if (event.dtstart.allDay) {
      const endDay = event.dtend
        ? new Date(event.dtend.date.getFullYear(),event.dtend.date.getMonth(),event.dtend.date.getDate())
        : new Date(startDay.getTime()+86400000);
      return dayStart>=startDay && dayStart<endDay;
    }
    return start>=dayStart && start<dayEnd;
  }

  if (dayStart<startDay) return false;
  const rules={};
  event.rrule.split(';').forEach(p=>{const eq=p.indexOf('=');if(eq!==-1)rules[p.slice(0,eq)]=p.slice(eq+1);});
  if (rules.UNTIL) {
    try{const u=parseDT('UNTIL',rules.UNTIL).date; if(dayStart>new Date(u.getFullYear(),u.getMonth(),u.getDate()))return false;}catch(e){}
  }
  const freq=rules.FREQ, iv=parseInt(rules.INTERVAL||'1');
  if(freq==='DAILY'){const diff=Math.round((dayStart-startDay)/86400000);return diff>=0&&diff%iv===0;}
  if(freq==='WEEKLY'){
    const WD=['SU','MO','TU','WE','TH','FR','SA'];
    const todWD=WD[date.getDay()];
    const byday=rules.BYDAY?rules.BYDAY.split(',').map(d=>d.replace(/[-+\d]/g,'')):[WD[start.getDay()]];
    if(!byday.includes(todWD))return false;
    const wk=Math.floor((dayStart-startDay)/(7*86400000));
    return wk>=0&&wk%iv===0;
  }
  if(freq==='MONTHLY'){
    if(date.getDate()!==start.getDate())return false;
    const md=(date.getFullYear()-start.getFullYear())*12+(date.getMonth()-start.getMonth());
    return md>=0&&md%iv===0;
  }
  if(freq==='YEARLY'){
    if(date.getMonth()!==start.getMonth()||date.getDate()!==start.getDate())return false;
    return date.getFullYear()>=start.getFullYear();
  }
  return false;
}

async function fetchAllEvents() {
  const cals = CALENDARS[activeCal] || [];
  const results = await Promise.all(cals.map(async cal => {
    try {
      const res = await fetch(CORS_PROXY + encodeURIComponent(cal.url));
      if (!res.ok) return [];
      return parseICS(await res.text(), cal);
    } catch(e){ return []; }
  }));
  return results.flat();
}

function renderWeek() {
  const days = getWeekDays();
  const today = new Date(); today.setHours(0,0,0,0);

  // Week label
  const first = days[0], last = days[6];
  const sameMonth = first.getMonth()===last.getMonth();
  document.getElementById('weekLabel').textContent = sameMonth
    ? `${MON_NAMES[first.getMonth()]} ${first.getDate()}–${last.getDate()}`
    : `${MON_NAMES[first.getMonth()]} ${first.getDate()} – ${MON_NAMES[last.getMonth()]} ${last.getDate()}`;

  // Header date
  document.getElementById('dateStr').textContent = today.toLocaleDateString('en-CA',{month:'short',day:'numeric'});

  if (!cachedEvents) return; // Wait for fetch

  const container = document.getElementById('week-view');
  container.innerHTML = '';

  days.forEach(day => {
    const isToday = sameDay(day, today);
    const dayEvents = cachedEvents
      .filter(e => occursOnDate(e, day))
      .sort((a,b) => {
        if(a.dtstart.allDay&&!b.dtstart.allDay) return -1;
        if(!a.dtstart.allDay&&b.dtstart.allDay) return 1;
        return a.dtstart.date-b.dtstart.date;
      });

    const section = document.createElement('div');
    section.className = 'day-section' + (isToday?' today':'');

    // Day header
    const hdr = document.createElement('div');
    hdr.className = 'day-header' + (isToday?' today':'');
    hdr.innerHTML = `<span class="day-name${isToday?' today':''}">${DAY_NAMES[day.getDay()]}</span><span class="day-date${isToday?' today':''}">${day.getDate()}</span>`;
    section.appendChild(hdr);

    // Events or free
    if (dayEvents.length === 0) {
      const free = document.createElement('div');
      free.className = 'day-free';
      free.textContent = 'Free';
      section.appendChild(free);
    } else {
      const evList = document.createElement('div');
      evList.className = 'day-events';
      dayEvents.forEach(e => {
        const row = document.createElement('div');
        row.className = 'day-event-row';
        const isAllDay = e.dtstart.allDay;
        const timeStr = isAllDay ? 'All day'
          : fmtTime(e.dtstart.date) + (e.dtend ? '\n' + fmtTime(e.dtend.date) : '');
        row.innerHTML = `
          <div class="day-event-time">${timeStr.replace('\n','<br>')}</div>
          <div class="day-event-title">${e.summary}</div>
          <span class="day-event-badge" style="background:${e.cal.color}">${e.cal.label}</span>`;
        evList.appendChild(row);
      });
      section.appendChild(evList);
    }

    container.appendChild(section);
  });

  // Scroll to today if on current week
  if (weekOffset === 0) {
    setTimeout(() => {
      const todayEl = container.querySelector('.day-section.today');
      if (todayEl) todayEl.scrollIntoView({ behavior:'smooth', block:'start' });
    }, 100);
  }
}

async function loadAndRenderWeek() {
  document.getElementById('week-view').innerHTML = '<div class="cal-loading">Loading calendar…</div>';
  cachedEvents = await fetchAllEvents();
  renderWeek();
}

async function refreshCal() {
  cachedEvents = null;
  await loadAndRenderWeek();
  showToast('Calendar refreshed');
}

// ─── LISTS ─────────────────────────────────────────────────────────────────
const sectionOrder={health:['groceries','recipes','restaurants','mentalHealth'],fun:['movies','shows','books','hobbies','activities'],home:['tasksErin','tasksSina','tasksShared','discuss'],work:['workErin','workSina','workShared']};

function renderLists(sid){
  const container=document.getElementById('lists-'+sid); container.innerHTML='';
  sectionOrder[sid].forEach(key=>{
    const list=appData.lists[key],activeCount=list.items.filter(i=>!i.done).length;
    const card=document.createElement('div');card.className='list-card';
    const hdr=document.createElement('div');hdr.className='list-card-header';
    hdr.innerHTML=`<span class="list-card-title">${list.name}</span><div class="list-card-meta"><span class="item-count" id="count-${key}">${activeCount}</span><button class="expand-btn" id="chev-${key}">+</button></div>`;
    hdr.onclick=()=>toggleList(key);
    const body=document.createElement('div');body.className='list-body';body.id='body-'+key;
    const itemsDiv=document.createElement('div');itemsDiv.className='list-items';itemsDiv.id='items-'+key;
    renderItems(key,itemsDiv);
    const form=document.createElement('div');form.className='add-form';
    form.innerHTML=`<input class="add-input" id="input-${key}" placeholder="Add item…" onkeydown="if(event.key==='Enter')addItem('${key}')"><select class="priority-select" id="pri-${key}"><option value="">—</option><option value="high">High</option><option value="med">Med</option><option value="low">Low</option></select><button class="add-btn" onclick="addItem('${key}')">Add</button>`;
    body.appendChild(itemsDiv);body.appendChild(form);card.appendChild(hdr);card.appendChild(body);container.appendChild(card);
  });
}
function renderItems(key,container){
  const items=appData.lists[key].items;container.innerHTML='';
  if(items.length===0){container.innerHTML='<div class="empty-state">Nothing here yet</div>';return;}
  const sorted=[...items.filter(i=>!i.done).sort((a,b)=>{const o={high:0,med:1,low:2,'':3};return(o[a.priority]??3)-(o[b.priority]??3);}),...items.filter(i=>i.done)];
  sorted.forEach(item=>{
    const row=document.createElement('div');row.className='list-item';
    const chk=document.createElement('div');chk.className='item-check'+(item.done?' checked':'');chk.innerHTML=item.done?'✓':'';chk.onclick=()=>toggleDone(key,item.id);
    const txt=document.createElement('span');txt.className='item-text'+(item.done?' done':'');txt.textContent=item.text;
    const del=document.createElement('button');del.className='item-delete';del.textContent='×';del.onclick=()=>deleteItem(key,item.id);
    row.appendChild(chk);row.appendChild(txt);
    if(item.priority){const p=document.createElement('span');p.className='item-priority priority-'+item.priority;p.textContent=item.priority;row.appendChild(p);}
    row.appendChild(del);container.appendChild(row);
  });
}
function toggleList(key){const body=document.getElementById('body-'+key),chev=document.getElementById('chev-'+key),open=body.classList.contains('open');body.classList.toggle('open',!open);chev.textContent=open?'+':'−';if(!open)setTimeout(()=>document.getElementById('input-'+key)?.focus(),100);}
function updateCount(key){const el=document.getElementById('count-'+key);if(el)el.textContent=appData.lists[key].items.filter(i=>!i.done).length;}
function addItem(key){
  const input=document.getElementById('input-'+key),pri=document.getElementById('pri-'+key),text=input.value.trim();if(!text)return;
  const newItem={id:Date.now(),text,priority:pri.value,done:false};
  appData.lists[key].items.push(newItem);save();input.value='';pri.value='';
  renderItems(key,document.getElementById('items-'+key));updateCount(key);showToast('Added ✓');pushItem(key,newItem);
}
function toggleDone(key,id){const item=appData.lists[key].items.find(i=>i.id===id);if(item){item.done=!item.done;save();pushItem(key,item);}renderItems(key,document.getElementById('items-'+key));updateCount(key);}
function deleteItem(key,id){const item=appData.lists[key].items.find(i=>i.id===id);if(item)removeFromSupabase(item);appData.lists[key].items=appData.lists[key].items.filter(i=>i.id!==id);save();renderItems(key,document.getElementById('items-'+key));updateCount(key);}

function setSyncStatus(s){const dot=document.getElementById('syncDot');if(!dot)return;dot.className='sync-dot'+(s==='live'?' live':s==='syncing'?' syncing':'');dot.title=s==='live'?'Synced':s==='syncing'?'Syncing…':'Offline';}
async function pushUnsynced(){for(const key of Object.keys(appData.lists))for(const item of appData.lists[key].items)if(!item.sbId&&!PLACEHOLDERS.includes(item.text))await pushItem(key,item);}
async function syncFromSupabase(){
  setSyncStatus('syncing');
  const{data:rows,error}=await sb.from('list_items').select('*').order('position',{ascending:true});
  if(error||!rows){setSyncStatus('offline');return;}
  const remote={};rows.forEach(r=>{if(!remote[r.list_name])remote[r.list_name]=[];remote[r.list_name].push(r);});
  let changed=false;
  Object.keys(appData.lists).forEach(key=>{if(remote[key]&&remote[key].length>0){appData.lists[key].items=remote[key].map(r=>({id:r.position||Date.now(),sbId:r.id,text:r.text,priority:r.priority==='none'?'':r.priority,done:r.completed}));changed=true;}});
  if(changed){save();refreshActiveSection();}setSyncStatus('live');
}
async function pushItem(listKey,item){
  if(PLACEHOLDERS.includes(item.text))return;
  if(item.sbId){await sb.from('list_items').update({text:item.text,completed:item.done||false,priority:item.priority||'none'}).eq('id',item.sbId);}
  else{const{data,error}=await sb.from('list_items').insert({list_name:listKey,text:item.text,completed:item.done||false,priority:item.priority||'none',position:item.id}).select();if(!error&&data&&data[0]){item.sbId=data[0].id;save();}}
}
async function removeFromSupabase(item){if(item.sbId)await sb.from('list_items').delete().eq('id',item.sbId);}
function subscribeRealtime(){sb.channel('list_items_changes').on('postgres_changes',{event:'*',schema:'public',table:'list_items'},()=>syncFromSupabase()).subscribe(s=>{if(s==='SUBSCRIBED')setSyncStatus('live');});}
function refreshActiveSection(){const active=document.querySelector('.section.active');if(!active)return;const id=active.id.replace('section-','');if(['health','fun','home','work'].includes(id))renderLists(id);}
async function startSync(){setSyncStatus('syncing');await pushUnsynced();await syncFromSupabase();subscribeRealtime();}

const navMap={today:0,health:1,fun:2,home:3,work:4,growth:5};
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('section-'+id)?.classList.add('active');

  if(navMap[id]!==undefined)btns[navMap[id]]?.classList.add('active');
  if(['health','fun','home','work'].includes(id))renderLists(id);
}
